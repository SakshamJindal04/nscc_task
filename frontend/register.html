<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Event Club</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Event Club</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html" class="active">Register</a>
      <a href="attendance.html">Attendance</a>
      <a href="previousevents.html">Previous Events</a>
      <a href="about.html">About</a>
      <a href="admin.html">Admin</a>
      <button id="theme-toggle" aria-label="Toggle Dark Mode">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </nav>
  </header>

  <main>
    <div class="container reveal">
      <div id="registration-form-container" class="card form-container">
        <h2 class="page-title">Register for our Event 🎉</h2>
        <form id="register-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="regId">Registration ID</label>
            <input type="text" id="regId" name="regId" placeholder="e.g., Your College ID" required>
          </div>
          <button type="submit" id="submit-btn">Generate QR Code</button>
        </form>
      </div>
      
      <div id="result-container" class="form-container" style="text-align: center;"></div>
    </div>
  </main>
  
  <footer>
    <p>&copy; 2025 Event Club. All rights reserved.</p>
  </footer>

  <script src="js/theme.js"></script>
  <script>
    const registerForm = document.getElementById('register-form');
    const formContainer = document.getElementById('registration-form-container');
    const resultContainer = document.getElementById('result-container');
    const submitBtn = document.getElementById('submit-btn');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Loading state
      submitBtn.innerHTML = 'Generating... <span style="animation: spin 1s linear infinite; display: inline-block;">↻</span>';
      submitBtn.disabled = true;
      resultContainer.innerHTML = '';

      const formData = new FormData(registerForm);
      const data = Object.fromEntries(formData.entries());

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data),
        });

        const result = await response.json();

        if (result.success) {
          formContainer.style.display = 'none'; // Hide the form
          resultContainer.innerHTML = `
            <div class="card reveal">
              <div class="message success">Registration Successful!</div>
              <p>Please save this QR code for check-in.</p>
              <img src="${result.qrCode}" alt="Your QR Code" style="border-radius: var(--border-radius); box-shadow: var(--shadow-sm); max-width: 250px; margin: 1rem auto; display: block;">
              <button onclick="window.location.reload()" style="margin-top: 1rem;">Register Another</button>
            </div>
          `;
        } else {
          resultContainer.innerHTML = `<div class="message error">${result.message || 'An error occurred.'}</div>`;
        }
      } catch (error) {
        resultContainer.innerHTML = `<div class="message error">Could not connect to the server.</div>`;
      } finally {
        submitBtn.innerHTML = 'Generate QR Code';
        submitBtn.disabled = false;
      }
    });
  </script>
  <style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</body>
</html>
