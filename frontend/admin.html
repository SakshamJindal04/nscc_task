<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Event Club</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <script src="/socket.io/socket.io.js"></script>

  <style>
    #login-section { max-width: 400px; margin: 0 auto; }
    #attendance-section { display: none; }
    .table-container { overflow-x: auto; }
    
    .row-updated { animation: highlight 1.5s ease-out; }
    @keyframes highlight { 
      from { background-color: rgba(59, 130, 246, 0.2); } 
      to { background-color: transparent; } 
    }
  </style>
</head>
<body>

  <header>
    <h1>Event Club</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Register</a>
      <a href="attendance.html">Attendance</a>
      <a href="previousevents.html">Previous Events</a>
      <a href="about.html">About</a>
      <a href="admin.html" class="active">Admin</a>
      <button id="theme-toggle" aria-label="Toggle Dark Mode">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </nav>
  </header>

  <main>
    <div class="container reveal">
      
      <!-- Login Section -->
      <div id="login-section" class="card form-container">
        <h2 class="page-title" style="margin-top:0">Admin Login 🔐</h2>
        <form id="login-form">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Hint: admin123" required>
          </div>
          <button type="submit" style="width:100%">Login</button>
          <div id="login-feedback" class="feedback"></div>
        </form>
      </div>

      <!-- Attendance Data Section -->
      <div id="attendance-section" class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
          <h2 class="page-title" style="margin:0">Real-Time Attendance 📊</h2>
          <button onclick="window.location.href='/api/export'" style="background: var(--secondary-color);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:20px;height:20px;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Export to Excel
          </button>
        </div>
        
        <div class="table-container">
          <table id="attendance-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Registration ID</th>
                <th>Status</th>
                <th>Timestamp</th>
              </tr>
            </thead>
            <tbody id="attendance-body">
              <!-- Data will be populated here -->
              <tr><td colspan="5" style="text-align: center;">Loading data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  
  <footer>
    <p>&copy; 2025 Event Club. All rights reserved.</p>
  </footer>

  <script src="js/theme.js"></script>
  <script>
    const loginSection = document.getElementById('login-section');
    const attendanceSection = document.getElementById('attendance-section');
    const loginForm = document.getElementById('login-form');
    const loginFeedback = document.getElementById('login-feedback');
    const attendanceBody = document.getElementById('attendance-body');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginFeedback.textContent = '';
      loginFeedback.className = 'feedback';
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (response.ok) {
          loginSection.style.display = 'none';
          attendanceSection.style.display = 'block';
          fetchAttendanceData();
          setupSocketListeners();
        } else {
          loginFeedback.textContent = 'Incorrect password. Please try again.';
          loginFeedback.classList.add('error');
        }
      } catch (err) {
        loginFeedback.textContent = 'Could not connect to the server.';
        loginFeedback.classList.add('error');
      }
    });

    async function fetchAttendanceData() {
      try {
        const response = await fetch('/api/admin/attendance');
        if (!response.ok) {
          loginSection.style.display = 'block';
          attendanceSection.style.display = 'none';
          return;
        }
        const participants = await response.json();
        populateTable(participants);
      } catch (err) {
        console.error('Failed to fetch attendance:', err);
      }
    }

    function populateTable(participants) {
      if (participants.length === 0) {
        attendanceBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No participants registered yet.</td></tr>';
        return;
      }
      
      attendanceBody.innerHTML = ''; 
      participants.forEach(p => {
        const row = document.createElement('tr');
        row.dataset.id = p.id; 

        const statusClass = p.attended ? 'status-present' : 'status-absent';
        const statusText = p.attended ? 'Present' : 'Absent';
        const timestamp = p.timestamp ? new Date(p.timestamp).toLocaleTimeString() : '—';

        row.innerHTML = `
          <td>${p.name}</td>
          <td>${p.email}</td>
          <td>${p.regId}</td>
          <td class="${statusClass}">${statusText}</td>
          <td>${timestamp}</td>
        `;
        attendanceBody.appendChild(row);
      });
    }

    function setupSocketListeners() {
      const socket = io();

      socket.on('attendanceUpdate', (updatedParticipant) => {
        const row = attendanceBody.querySelector(`tr[data-id='${updatedParticipant.id}']`);
        if (row) {
          const statusCell = row.children[3];
          const timestampCell = row.children[4];

          statusCell.textContent = 'Present';
          statusCell.className = 'status-present';
          timestampCell.textContent = new Date(updatedParticipant.timestamp).toLocaleTimeString();
          
          row.classList.add('row-updated');
          setTimeout(() => row.classList.remove('row-updated'), 1500);
        }
      });
    }
  </script>
</body>
</html>
