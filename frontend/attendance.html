<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance | Event Club</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* Scanner specific styles */
    #video-container { 
      width: 100%; 
      max-width: 500px; 
      margin: 20px auto; 
      border-radius: var(--border-radius); 
      overflow: hidden; 
      box-shadow: var(--shadow-sm); 
      position: relative; 
      display: none; 
      background: #000;
      border: 4px solid var(--border-color);
    }
    #video-container video { width: 100%; height: auto; display: block; }
    #scan-line { 
      display: none; 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 4px; 
      background: var(--primary-color); 
      box-shadow: 0 0 10px var(--primary-color);
      animation: scanning 2s infinite ease-in-out; 
    }
    @keyframes scanning { 
      0% { transform: translateY(0); } 
      50% { transform: translateY(calc(100% - 4px)); } 
      100% { transform: translateY(0); } 
    }
    .hr-divider {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 3rem 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Event Club</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="register.html">Register</a>
      <a href="attendance.html" class="active">Attendance</a>
      <a href="previousevents.html">Previous Events</a>
      <a href="about.html">About</a>
      <a href="admin.html">Admin</a>
      <button id="theme-toggle" aria-label="Toggle Dark Mode">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </nav>
  </header>

  <main>
    <div class="container reveal">
      <div class="card form-container">
        <h2 class="page-title" style="margin-top:0">Mark Your Attendance ✅</h2>

        <div id="qr-scanner-container" style="text-align: center;">
          <p class="subtitle">Scan your QR code for instant check-in.</p>
          <button id="start-scan-btn">Scan QR Code</button>
          
          <div id="video-container">
            <video id="qr-video"></video>
            <div id="scan-line"></div>
          </div>
          
          <button id="stop-scan-btn" class="btn" style="display:none; background-color: var(--text-muted); margin: 15px auto 0;">Stop Camera</button>
          <div id="scan-feedback" class="feedback"></div>
        </div>
        
        <hr class="hr-divider">

        <div>
          <p class="subtitle" style="margin-bottom: 20px;">Or, enter your registration ID manually:</p>
          <form id="manual-form">
            <div class="form-group">
              <label for="regId">Registration ID or Email</label>
              <input type="text" id="regId" placeholder="e.g., EVT-12345 or your@email.com" required>
            </div>
            <button type="submit" style="width:100%">Mark Present</button>
            <div id="manual-feedback" class="feedback"></div>
          </form>
        </div>
      </div>
    </div>
  </main>
  
  <footer>
    <p>&copy; 2025 Event Club. All rights reserved.</p>
  </footer>

  <script src="js/theme.js"></script>
  <script>
    const video = document.getElementById('qr-video');
    const videoContainer = document.getElementById('video-container');
    const startScanBtn = document.getElementById('start-scan-btn');
    const stopScanBtn = document.getElementById('stop-scan-btn');
    const scanLine = document.getElementById('scan-line');
    const scanFeedback = document.getElementById('scan-feedback');
    const manualForm = document.getElementById('manual-form');
    const manualFeedback = document.getElementById('manual-feedback');
    const regIdInput = document.getElementById('regId');

    let stream = null;
    let animationFrameId = null;

    // --- Unified function to mark attendance ---
    async function markAttendance(code, feedbackElement) {
      feedbackElement.textContent = 'Checking in...';
      feedbackElement.className = 'feedback';
      try {
        const response = await fetch('/api/attendance/mark', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });

        const contentType = response.headers.get("content-type");
        if (contentType && contentType.indexOf("application/json") !== -1) {
            const result = await response.json();
            if (response.ok) {
              feedbackElement.textContent = `${result.message} Timestamp: ${new Date(result.timestamp).toLocaleTimeString()}`;
              feedbackElement.classList.add('success');
            } else {
              feedbackElement.textContent = result.message || 'Error marking attendance.';
              feedbackElement.classList.add('error');
            }
        } else {
            throw new Error("Server sent invalid response format.");
        }
      } catch (error) {
        console.error('Fetch error:', error);
        feedbackElement.textContent = error.message || 'Could not connect to the server.';
        feedbackElement.classList.add('error');
      }
    }

    // --- QR Code Scanning Logic ---
    startScanBtn.addEventListener('click', async () => {
      scanFeedback.textContent = 'Initializing camera...';
      scanFeedback.className = 'feedback';
      
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        
        scanFeedback.textContent = '';
        videoContainer.style.display = 'block';
        scanLine.style.display = 'block';
        startScanBtn.style.display = 'none';
        stopScanBtn.style.display = 'inline-flex';

        animationFrameId = requestAnimationFrame(tick);
      } catch (err) {
        console.error("Camera Error:", err);
        scanFeedback.textContent = 'Could not access camera. Please grant permission.';
        scanFeedback.className = 'feedback error';
      }
    });

    stopScanBtn.addEventListener('click', stopScanning);

    function stopScanning() {
      if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
      if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
      videoContainer.style.display = 'none';
      scanLine.style.display = 'none';
      startScanBtn.style.display = 'inline-flex';
      stopScanBtn.style.display = 'none';
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const canvasElement = document.createElement('canvas');
        const canvas = canvasElement.getContext('2d');
        canvasElement.height = video.videoHeight;
        canvasElement.width = video.videoWidth;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
        const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code) {
          stopScanning();
          markAttendance(code.data, scanFeedback);
          return;
        }
      }
      animationFrameId = requestAnimationFrame(tick);
    }

    // --- Manual Form Submission Logic ---
    manualForm.addEventListener('submit', (e) => {
      e.preventDefault();
      markAttendance(regIdInput.value, manualFeedback);
    });
  </script>
</body>
</html>
